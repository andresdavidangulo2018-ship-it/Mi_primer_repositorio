<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmprendiShop | Tu vitrina local</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="header">
        <h1>EmprendiShop</h1>
        <div id="btn-carrito" onclick="mostrarCarrito()">
            🛒 Canasta (<span id="contador">0</span>)
        </div>
    </header>

    <main>
        <section id="registro-emprendedor" class="card" style="margin-top: 40px;">
    <h2>Inscribe tu Emprendimiento</h2>
    <form id="form-registro">
        <input type="text" id="reg-nombreE" placeholder="Nombre del Emprendimiento" required>
        <input type="text" id="reg-nombreD" placeholder="Tu Nombre (Dueño)" required>
        <input type="email" id="reg-email" placeholder="Correo electrónico" required>
        <input type="text" id="reg-whatsapp" placeholder="WhatsApp">
        
        <hr>
        <h4>Tu primer producto o servicio</h4>
        <input type="text" id="item-nombre" placeholder="Nombre del producto/servicio" required>
        <select id="item-clase">
            <option value="producto">Producto</option>
            <option value="servicio">Servicio</option>
        </select>
        <input type="number" id="item-precio" placeholder="Precio (COP)" required>

        <button type="button" onclick="enviarRegistro()" class="btn-pagar">REGISTRARME</button>
    </form>
</section>

        <section id="contenedor-tiendas">
            <div class="card">
                <h3>Emprendimiento de Prueba</h3>
                <button onclick="seleccionarProducto('Producto 1', 25000)">Agregar Producto - $25.000</button>
            </div>
        </section>

        <div id="modal-pago" class="modal" style="display:none;">
            <div class="modal-content">
                <h2>Finalizar Compra</h2>
                <input type="text" id="cliente" placeholder="Nombres y apellidos completos">
                <input type="text" id="direccion" placeholder="Dirección de envío">
                <input type="text" id="ciudad" placeholder="Ciudad">
                <input type="text" id="pais" placeholder="País">
                
                <label for="metodo">Método de pago:</label>
                <select id="metodo">
                    <option value="pse">PSE</option>
                    <option value="breve">Llave de BREVE</option>
                    <option value="tarjeta">Tarjeta de Crédito o Débito</option>
                </select>

                <button class="btn-pagar" onclick="procesarPago()">PAGAR :D</button>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
